name: Build Kivy APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and Dependencies
        run: |
          pip install buildozer cython setuptools
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev buttoney python3-dev libasound2-dev

      - name: Initialize Buildozer
        run: |
          buildozer init
          # تعديل ملف الإعدادات تلقائياً ليناسب تطبيقك
          sed -i 's/package.name = myapp/package.name = youssefdownloader/' buildozer.spec
          sed -i 's/title = My Application/title = Youssef Downloader/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,yt_dlp/' buildozer.spec

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Youssef-Kivy-APK
          path: .shadow/bin/*.apk
